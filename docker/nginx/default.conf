server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API → backend
    location /api/ {
        proxy_pass http://appointments:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Static uploads
    location /static/ {
        proxy_pass http://appointments:8000;
    }
    # API docs (protected by secret key query param on backend)
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass http://appointments:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Frontend — SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
