services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pacsflow_appointments
      POSTGRES_USER: pacsflow
      POSTGRES_PASSWORD: PacsFlow2026SecureDB
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  frontend:
    image: nginx:alpine
    container_name: pf-frontend
    ports:
      - "3000:80"
    volumes:
      - ./pf-appo-admin/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - appointments

  appointments:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    depends_on:
      - db
    volumes:
      - .:/app
    command: >-
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata: